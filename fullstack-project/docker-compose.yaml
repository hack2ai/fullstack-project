version: '3.9'

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: groot213/flask-backend:latest
    container_name: flask_backend
    ports:
      - "5000:5000"
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: groot213/node-frontend:latest
    container_name: node_frontend
    ports:
      - "3000:3000"
    environment:
      - FLASK_BACKEND_URL=http://backend:5000
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge